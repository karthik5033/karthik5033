<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .scan { animation: scan 2s ease-in-out infinite alternate; }
      .pulse { animation: pulse 2s infinite; }
      @keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }
      @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 4px #00CCFF); } 50% { filter: drop-shadow(0 0 12px #00CCFF); } }
    </style>
  </defs>
  <g class="pulse">
    <!-- Medical Cross -->
    <path d="M40 25 L60 25 L60 40 L75 40 L75 60 L60 60 L60 75 L40 75 L40 60 L25 60 L25 40 L40 40 Z" stroke="#00CCFF" stroke-width="3" fill="rgba(0,204,255,0.1)"/>
    <circle cx="50" cy="50" r="5" fill="#F8D866"/>
  </g>
  <!-- Scan Line -->
  <g class="scan">
    <line x1="20" y1="25" x2="80" y2="25" stroke="#00FF9D" stroke-width="2" filter="drop-shadow(0 0 5px #00FF9D)"/>
    <polygon points="50,25 45,15 55,15" fill="#00FF9D" fill-opacity="0.5"/>
  </g>
</svg>
