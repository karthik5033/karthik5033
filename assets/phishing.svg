<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .spin { animation: spin 3s linear infinite; transform-origin: 50px 50px; }
      .ping { animation: ping 1.5s ease-out infinite; transform-origin: 50px 50px; }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes ping { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
  </defs>
  <g filter="drop-shadow(0 0 5px #00FF9D)">
    <circle cx="50" cy="50" r="35" stroke="#00FF9D" stroke-width="2" fill="none" stroke-opacity="0.3"/>
    <circle cx="50" cy="50" r="20" stroke="#00FF9D" stroke-width="2" fill="none" stroke-opacity="0.2"/>
    <circle cx="50" cy="50" r="35" stroke="#00FF9D" stroke-width="2" fill="none" class="ping"/>
    <!-- Radar Sweep -->
    <path d="M50 50 L50 15 A35 35 0 0 1 85 50 Z" fill="#00FF9D" fill-opacity="0.3" class="spin"/>
  </g>
  <!-- Target Dot -->
  <circle cx="65" cy="35" r="4" fill="#FF3366" filter="drop-shadow(0 0 6px #FF3366)">
    <animate attributeName="opacity" values="0;1;0;0" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
