<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .float { animation: float 3s ease-in-out infinite; transform-origin: center; }
      .glow { animation: glow 2s ease-in-out infinite alternate; }
      .dash { animation: dash 2s linear infinite; }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes glow { 0% { filter: drop-shadow(0 0 2px #FF00FF); } 100% { filter: drop-shadow(0 0 12px #FF00FF); } }
      @keyframes dash { to { stroke-dashoffset: -20; } }
    </style>
  </defs>
  <g class="float">
    <!-- Brain Outline -->
    <path d="M50 30 C 20 20, 10 50, 30 70 C 40 80, 60 80, 70 70 C 90 50, 80 20, 50 30 Z" stroke="#FF00FF" stroke-width="3" fill="rgba(255,0,255,0.05)" class="glow"/>
    <!-- Neural Nodes -->
    <circle cx="35" cy="50" r="4" fill="#00CCFF"/>
    <circle cx="65" cy="50" r="4" fill="#00CCFF"/>
    <circle cx="50" cy="60" r="6" fill="#00CCFF" filter="drop-shadow(0 0 5px #00CCFF)"/>
    <path d="M35 50 L50 60 L65 50" stroke="#00CCFF" stroke-width="2" stroke-dasharray="5 5" class="dash"/>
  </g>
</svg>
