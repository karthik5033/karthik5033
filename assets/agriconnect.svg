<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .grow { animation: grow 3s infinite alternate; transform-origin: bottom center; }
      .nodes { animation: pulse 2s infinite; }
      @keyframes grow { 0% { transform: scale(0.95) rotate(-3deg); } 100% { transform: scale(1.05) rotate(3deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; filter: drop-shadow(0 0 8px #00FF9D); } }
    </style>
  </defs>
  <g class="grow">
    <!-- Leaf Base -->
    <path d="M50 85 Q 30 50, 50 15 Q 70 50, 50 85 Z" stroke="#00FF9D" stroke-width="4" fill="rgba(0, 255, 157, 0.1)" filter="drop-shadow(0 0 8px #00FF9D)"/>
    <!-- Network Lines -->
    <line x1="50" y1="85" x2="50" y2="40" stroke="#00FF9D" stroke-width="2"/>
    <line x1="50" y1="65" x2="35" y2="50" stroke="#00FF9D" stroke-width="2"/>
    <line x1="50" y1="55" x2="65" y2="40" stroke="#00FF9D" stroke-width="2"/>
  </g>
  <g class="nodes">
    <circle cx="50" cy="40" r="4" fill="#F8D866"/>
    <circle cx="35" cy="50" r="4" fill="#F8D866"/>
    <circle cx="65" cy="40" r="4" fill="#F8D866"/>
    <circle cx="50" cy="15" r="5" fill="#F8D866"/>
  </g>
</svg>
