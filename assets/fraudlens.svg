<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .blink { animation: blink 4s infinite; transform-origin: center; }
      .search { animation: search 2s infinite alternate ease-in-out; }
      @keyframes blink { 0%, 95%, 100% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }
      @keyframes search { 0% { transform: translateX(-5px); } 100% { transform: translateX(5px); } }
    </style>
  </defs>
  <g class="search">
    <!-- Eye Shape -->
    <path class="blink" d="M15 50 C30 25, 70 25, 85 50 C70 75, 30 75, 15 50 Z" stroke="#F8D866" stroke-width="4" fill="rgba(248, 216, 102, 0.1)" filter="drop-shadow(0 0 8px #F8D866)"/>
    <!-- Iris/Lens -->
    <circle cx="50" cy="50" r="15" stroke="#FF3366" stroke-width="3" fill="none" filter="drop-shadow(0 0 5px #FF3366)"/>
    <circle cx="50" cy="50" r="6" fill="#FF3366"/>
  </g>
</svg>
