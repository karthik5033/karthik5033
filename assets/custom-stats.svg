<svg width="420" height="240" viewBox="0 0 420 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
          
          .bg { fill: #0D1117; }
          
          .glass-panel {
            fill: #161B22;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 1.5;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.5));
          }
          
          .term-key { font-family: 'Fira Code', monospace; fill: #8B949E; font-weight: 400; }
          .term-num { font-family: 'Fira Code', monospace; fill: #c9cacc; font-weight: 400; }

          .title {
            font-family: 'Fira Code', monospace;
            font-size: 16px;
            font-weight: 700;
            fill: #FFFFFF;
            text-shadow: 0 0 5px rgba(255,255,255,0.2);
          }

          .animate-item {
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
          }

          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
          }
        </style>
        <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
          <rect width="4" height="2" fill="#000" opacity="0.6"/>
          <rect y="2" width="4" height="2" fill="transparent"/>
        </pattern>
      </defs>

      <!-- Main GitHub Background Canvas -->
      <rect x="0" y="0" width="420" height="240" class="bg" rx="15" />

      <!-- Top Languages Panel -->
      <rect x="10" y="10" width="400" height="220" rx="10" class="glass-panel" />
      <rect x="10" y="10" width="400" height="220" rx="10" fill="url(#scanlines)" opacity="0.1" />
      
      <text x="210" y="40" text-anchor="middle" class="title animate-item" style="animation-delay: 200ms;">🍩 Top Languages</text>
      <line x1="30" y1="52" x2="390" y2="52" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
      
      <!-- Generated SVG Arcs -->
      <g transform="translate(130, 135) rotate(-90)">
        
      <!-- TypeScript -->
      <circle cx="0" cy="0" r="45" fill="transparent" stroke="#3178c6" stroke-width="14" stroke-dasharray="0 282.7433388230814" stroke-dashoffset="0" filter="drop-shadow(0 0 2px #3178c680)">
        <animate attributeName="stroke-dasharray" values="0 282.7433388230814; 190.56901036675686 282.7433388230814" dur="1s" begin="0s" fill="freeze" />
      </circle>
    
      <!-- Python -->
      <circle cx="0" cy="0" r="45" fill="transparent" stroke="#3572A5" stroke-width="14" stroke-dasharray="0 282.7433388230814" stroke-dashoffset="-190.56901036675686" filter="drop-shadow(0 0 2px #3572A580)">
        <animate attributeName="stroke-dasharray" values="0 282.7433388230814; 43.54247417875453 282.7433388230814" dur="1s" begin="0.15s" fill="freeze" />
      </circle>
    
      <!-- JavaScript -->
      <circle cx="0" cy="0" r="45" fill="transparent" stroke="#f1e05a" stroke-width="14" stroke-dasharray="0 282.7433388230814" stroke-dashoffset="-234.1114845455114" filter="drop-shadow(0 0 2px #f1e05a80)">
        <animate attributeName="stroke-dasharray" values="0 282.7433388230814; 22.61946710584651 282.7433388230814" dur="1s" begin="0.3s" fill="freeze" />
      </circle>
    
      <!-- Jupyter Notebook -->
      <circle cx="0" cy="0" r="45" fill="transparent" stroke="#DA5B0B" stroke-width="14" stroke-dasharray="0 282.7433388230814" stroke-dashoffset="-256.7309516513579" filter="drop-shadow(0 0 2px #DA5B0B80)">
        <animate attributeName="stroke-dasharray" values="0 282.7433388230814; 10.17876019763093 282.7433388230814" dur="1s" begin="0.44999999999999996s" fill="freeze" />
      </circle>
    
      <!-- CSS -->
      <circle cx="0" cy="0" r="45" fill="transparent" stroke="#663399" stroke-width="14" stroke-dasharray="0 282.7433388230814" stroke-dashoffset="-266.9097118489888" filter="drop-shadow(0 0 2px #66339980)">
        <animate attributeName="stroke-dasharray" values="0 282.7433388230814; 6.503096792930871 282.7433388230814" dur="1s" begin="0.6s" fill="freeze" />
      </circle>
    
      </g>
      
      <!-- Donut Hole Text -->
      <text x="130" y="140" text-anchor="middle" font-family="'Fira Code', monospace" font-size="13" font-weight="700" fill="#FFFFFF">Code</text>

      <!-- Language Legend List -->
      
      <g class="animate-item" style="animation-delay: 0ms">
        <rect x="230" y="75" width="12" height="12" rx="3" fill="#3178c6"/>
        <text x="255" y="85" class="term-key" style="font-size:12px;">TypeScript</text>
        <text x="395" y="85" class="term-num" style="font-size:12px;" text-anchor="end">67.4%</text>
      </g>
    
      <g class="animate-item" style="animation-delay: 150ms">
        <rect x="230" y="103" width="12" height="12" rx="3" fill="#3572A5"/>
        <text x="255" y="113" class="term-key" style="font-size:12px;">Python</text>
        <text x="395" y="113" class="term-num" style="font-size:12px;" text-anchor="end">15.4%</text>
      </g>
    
      <g class="animate-item" style="animation-delay: 300ms">
        <rect x="230" y="131" width="12" height="12" rx="3" fill="#f1e05a"/>
        <text x="255" y="141" class="term-key" style="font-size:12px;">JavaScript</text>
        <text x="395" y="141" class="term-num" style="font-size:12px;" text-anchor="end">8.0%</text>
      </g>
    
      <g class="animate-item" style="animation-delay: 450ms">
        <rect x="230" y="159" width="12" height="12" rx="3" fill="#DA5B0B"/>
        <text x="255" y="169" class="term-key" style="font-size:12px;">Jupyter Noteb...</text>
        <text x="395" y="169" class="term-num" style="font-size:12px;" text-anchor="end">3.6%</text>
      </g>
    
      <g class="animate-item" style="animation-delay: 600ms">
        <rect x="230" y="187" width="12" height="12" rx="3" fill="#663399"/>
        <text x="255" y="197" class="term-key" style="font-size:12px;">CSS</text>
        <text x="395" y="197" class="term-num" style="font-size:12px;" text-anchor="end">2.3%</text>
      </g>
    

    </svg>