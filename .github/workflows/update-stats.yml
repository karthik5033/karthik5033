name: Update Custom Stats SVG
on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC every day
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Setup Node.js environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install dotenv

      - name: Generate the Stats SVG
        run: node generate-stats.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in token from GitHub Actions!

      - name: Generate Custom Trophies and Heatmap
        run: node generate-widgets.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push the generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node -e "const fs=require('fs'); let c=fs.readFileSync('README.md','utf8'); c=c.replace(/\\?v=\\d+/g, '?v=' + Date.now()); fs.writeFileSync('README.md',c);"
          git add assets/*.svg README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "📈 Auto-update custom stats and heatmaps"
          git push
